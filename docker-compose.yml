# ─────────────────────────────────────────────────────────────────────────────
# PatchMap API — PRODUÇÃO (deploy na VM).
#
#   1. cp .env.example .env   e ajuste senha do banco, SECRET_KEY e ALLOWED_HOSTS
#   2. docker compose up -d --build
#   3. API em http://<ip-da-vm>:8000/  ·  Admin em /admin/
#
# Para desenvolvimento local (runserver + hot reload), use:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ─────────────────────────────────────────────────────────────────────────────
services:
  # ───────────────────────────────────────────────────────────────────────────
  # Backend: Django + DRF + JWT (servido por Gunicorn)
  # ───────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pathmapapi-backend
    restart: unless-stopped
    command: >
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers ${GUNICORN_WORKERS:-3}
      --timeout 60
      --access-logfile -
    ports:
      - '${BACKEND_PORT:-8000}:8000'
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-patchmap}:${POSTGRES_PASSWORD:-patchmap}@db:5432/${POSTGRES_DB:-patchmap}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-false}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-insecure-key-change-me-in-production}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,backend,10.0.2.2}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-}
      - CORS_ALLOW_ALL=${CORS_ALLOW_ALL:-true}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - SECURE_SSL=${SECURE_SSL:-false}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-admin@patchmap.com}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-123456}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pathmapapi-network

  # ───────────────────────────────────────────────────────────────────────────
  # Database: PostgreSQL 16 (sem porta exposta ao host em produção)
  # ───────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: pathmapapi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-patchmap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-patchmap}
      POSTGRES_DB: ${POSTGRES_DB:-patchmap}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-patchmap}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pathmapapi-network

networks:
  pathmapapi-network:
    driver: bridge

volumes:
  postgres-data:
